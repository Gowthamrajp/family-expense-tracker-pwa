<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512" role="img" aria-label="FamilyVault">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#15171a"/>
      <stop offset="1" stop-color="#0d0e0f"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="42%" r="60%">
      <stop offset="0" stop-color="#00f5ff" stop-opacity="0.30"/>
      <stop offset="0.6" stop-color="#00f5ff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="ring" x1="96" y1="96" x2="416" y2="416" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#63f7ff"/>
      <stop offset="1" stop-color="#00b8c4"/>
    </linearGradient>
    <filter id="soft" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Full-bleed background (maskable-safe). -->
  <rect width="512" height="512" fill="url(#bg)"/>
  <rect width="512" height="512" fill="url(#glow)"/>

  <!-- Emblem kept within the central safe zone for maskable icons. -->
  <g filter="url(#soft)">
    <!-- Outer orbiting ring (open) echoing the app splash. -->
    <circle cx="256" cy="256" r="150" fill="none" stroke="url(#ring)" stroke-width="18"
            stroke-linecap="round" stroke-dasharray="700 240" transform="rotate(-45 256 256)"/>
    <!-- Inner ring accent. -->
    <circle cx="256" cy="256" r="118" fill="none" stroke="#00f5ff" stroke-opacity="0.25" stroke-width="6"/>
  </g>

  <!-- Rupee glyph in neon cyan. -->
  <g fill="none" stroke="#00f5ff" stroke-width="26" stroke-linecap="round" stroke-linejoin="round" filter="url(#soft)">
    <line x1="206" y1="186" x2="318" y2="186"/>
    <line x1="206" y1="232" x2="318" y2="232"/>
    <path d="M206 186 q70 0 70 46 q0 46 -70 46 h-2 l86 84"/>
  </g>
</svg>
