<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0d0e0f" />
    <link rel="icon" type="image/svg+xml" href="/icon.svg" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="mask-icon" href="/icon.svg" color="#00f5ff" />
    <title>FamilyVault | Family Expense Tracker</title>
    <style>
      html,
      body {
        background-color: #0d0e0f;
        margin: 0;
      }

      /* ---- Initial splash (shown before React mounts) ------------------- */
      #app-splash {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 28px;
        background:
          radial-gradient(
            circle at 50% 38%,
            rgba(0, 245, 255, 0.10),
            rgba(13, 14, 15, 0) 60%
          ),
          #0d0e0f;
        font-family: 'Inter', system-ui, sans-serif;
        opacity: 1;
        transition: opacity 0.45s ease;
      }
      /* When React has mounted, body gets this class to fade the splash out. */
      body.app-ready #app-splash {
        opacity: 0;
        pointer-events: none;
      }

      .splash-emblem {
        position: relative;
        width: 96px;
        height: 96px;
        display: grid;
        place-items: center;
      }
      /* Two concentric rotating rings with the neon-cyan accent. */
      .splash-emblem::before,
      .splash-emblem::after {
        content: '';
        position: absolute;
        border-radius: 9999px;
        border: 2px solid transparent;
      }
      .splash-emblem::before {
        inset: 0;
        border-top-color: #00f5ff;
        border-right-color: rgba(0, 245, 255, 0.35);
        animation: splash-spin 1.1s linear infinite;
        box-shadow: 0 0 22px rgba(0, 245, 255, 0.35);
      }
      .splash-emblem::after {
        inset: 16px;
        border-bottom-color: #00f5ff;
        border-left-color: rgba(0, 245, 255, 0.25);
        animation: splash-spin 1.6s linear infinite reverse;
      }
      /* Pulsing core dot. */
      .splash-core {
        width: 30px;
        height: 30px;
        border-radius: 9999px;
        background: #00f5ff;
        box-shadow: 0 0 18px rgba(0, 245, 255, 0.7);
        animation: splash-pulse 1.4s ease-in-out infinite;
      }

      .splash-word {
        font-size: 28px;
        font-weight: 800;
        letter-spacing: -0.02em;
        color: #00f5ff;
        text-shadow: 0 0 14px rgba(0, 245, 255, 0.55);
        /* Cyan shimmer sweeping across the wordmark. */
        background: linear-gradient(
          100deg,
          #00f5ff 0%,
          #e9feff 30%,
          #00f5ff 60%
        );
        background-size: 220% 100%;
        -webkit-background-clip: text;
        background-clip: text;
        -webkit-text-fill-color: transparent;
        animation: splash-shimmer 2.2s linear infinite;
      }
      .splash-tag {
        margin-top: -16px;
        font-size: 11px;
        font-weight: 600;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        color: #b9caca;
        opacity: 0.7;
      }

      @keyframes splash-spin {
        to {
          transform: rotate(360deg);
        }
      }
      @keyframes splash-pulse {
        0%,
        100% {
          transform: scale(0.82);
          opacity: 0.85;
        }
        50% {
          transform: scale(1.12);
          opacity: 1;
        }
      }
      @keyframes splash-shimmer {
        to {
          background-position: -220% 0;
        }
      }
      @media (prefers-reduced-motion: reduce) {
        .splash-emblem::before,
        .splash-emblem::after,
        .splash-core,
        .splash-word {
          animation: none;
        }
      }
    </style>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <!-- Initial splash: visible instantly (before any JS), faded out by React. -->
    <div id="app-splash" aria-hidden="true">
      <div class="splash-emblem">
        <div class="splash-core"></div>
      </div>
      <div style="display: flex; flex-direction: column; align-items: center; gap: 6px">
        <div class="splash-word">FamilyVault</div>
        <div class="splash-tag">Family Ledger</div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
